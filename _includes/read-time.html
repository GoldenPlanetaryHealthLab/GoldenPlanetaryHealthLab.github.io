<div id="read-time-container"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const article =
    document.querySelector("main.content") ||
    document.querySelector("article") ||
    document.querySelector("main");

  if (!article) return;

  // Remove code, nav, TOC, and other non-reading content from the count
  const clone = article.cloneNode(true);
  clone.querySelectorAll("pre, code, nav, .sidebar, .toc, .quarto-title-meta, script, style")
       .forEach(el => el.remove());

  const text = clone.innerText.replace(/\s+/g, " ").trim();
  const words = text ? text.split(" ").length : 0;

  // Typical reading speed
  const wpm = 200;
  const minutes = Math.max(1, Math.ceil(words / wpm));

  const target =
    document.querySelector(".quarto-title-meta") ||
    document.querySelector("#title-block-header") ||
    document.getElementById("read-time-container");

  const readTime = document.createElement("div");
  readTime.className = "quarto-read-time";
  readTime.textContent = `${minutes} min read`;

  target.appendChild(readTime);
});
</script>
